<div class="notification-container">

  <div class="notif-header">
    <h4>Notifications</h4>
    <button class="mark-all-btn" (click)="markAllAsRead()">
      Mark all as read
    </button>
  </div>

  <div class="loading" *ngIf="isLoading">
    Loading...
  </div>

  <div class="empty" *ngIf="!isLoading && notifications.length === 0">
    No notifications yet
  </div>

  <div
    *ngFor="let notif of notifications"
    class="notif-item"
    [class.unread]="!notif.isRead"
    (click)="markAsRead(notif)">

    <span class="notif-icon">{{ getIcon(notif.type) }}</span>

    <div class="notif-content">
      <p class="notif-message">{{ notif.message }}</p>
      <small class="notif-time">{{ notif.createdAt | date: 'dd MMM, h:mm a' }}</small>
    </div>

    <span class="unread-dot" *ngIf="!notif.isRead"></span>

  </div>

</div>
