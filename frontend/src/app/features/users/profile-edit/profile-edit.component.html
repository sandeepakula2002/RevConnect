<div class="card">
  <h3>Edit Profile</h3>

  <input [(ngModel)]="profile.name" placeholder="Name">
  <textarea [(ngModel)]="profile.bio" placeholder="Bio"></textarea>
  <input [(ngModel)]="profile.location" placeholder="Location">
  <input [(ngModel)]="profile.website" placeholder="Website">

  <h4>Creator / Business</h4>
  <input [(ngModel)]="profile.category" placeholder="Category">
  <input [(ngModel)]="profile.contactInfo" placeholder="Contact Info">
  <input [(ngModel)]="profile.businessAddress" placeholder="Business Address">

  <button (click)="save()">Save</button>
</div>
