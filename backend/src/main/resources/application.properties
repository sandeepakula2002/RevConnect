# ============================================================
# RevConnect Application Configuration
# ============================================================

# ---------------------------
# Server
# ---------------------------
server.port=8080
server.servlet.context-path=/api

# ============================================================
# Database (AWS RDS MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://revconnectdb.ceh62g2e4ks8.us-east-1.rds.amazonaws.com:3306/revconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=Sivasai33
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------
# Hikari Connection Pool
# ---------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=ReplaceThisWithAStrongLocalDevSecretAtLeast64CharactersLongForHS512
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:4200,http://revconnect-frontend.s3-website-us-east-1.amazonaws.com

# ==============================================
# ==============
# Logging
# ============================================================
logging.config=classpath:log4j2.xml